# Cloud Custodian Policy Template
# Run with:
#   custodian run -s <output-dir> -c <policy.yaml> --output-dir /tmp
# (logged-in via env credentials: AWS_PROFILE / AZURE_SUBSCRIPTION_ID / GOOGLE_CLOUD_PROJECT)

policies:

